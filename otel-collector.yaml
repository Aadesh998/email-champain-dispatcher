receivers:
  otlp:
    protocols:
      http:

exporters:
  otlp:
    endpoint: tempo:4318
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp]

    metrics:
      receivers: [otlp]
      exporters: [prometheus]
