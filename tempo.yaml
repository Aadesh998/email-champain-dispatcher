# tempo.yaml
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    # Search is enabled by default in recent versions when block is present
    # or configured via different fields depending on exact 2.x version
    # Removing 'enabled: true' to fix unmarshal error

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

compactor:
  compaction:
    block_retention: 1h
